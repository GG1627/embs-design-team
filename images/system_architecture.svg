<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">BioBuddy System Architecture</title>
  <desc id="desc">Architecture diagram showing wearable sensors to ESP32 firmware, serial telemetry and camera perception feeding robot coaching.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="wearableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#deefff"/>
      <stop offset="100%" stop-color="#cbe4ff"/>
    </linearGradient>
    <linearGradient id="perceptionGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f7ea"/>
      <stop offset="100%" stop-color="#d7f1da"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1d8"/>
      <stop offset="100%" stop-color="#ffe6c0"/>
    </linearGradient>
    <linearGradient id="contractGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ebff"/>
      <stop offset="100%" stop-color="#e9dbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1b2a41" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#375a7f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bgGrad)"/>
  <text x="800" y="70" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="42" font-weight="700" fill="#10243f">BioBuddy System Architecture</text>
  <text x="800" y="106" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#3b4e6b">Wearable Telemetry + Camera Perception + Robot Coaching</text>

  <rect x="70" y="160" width="520" height="730" rx="22" fill="url(#wearableGrad)" stroke="#8cb7e3" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="210" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#173a63">Wearable Layer</text>

  <rect x="110" y="250" width="440" height="205" rx="14" fill="#f8fcff" stroke="#9ec4eb" stroke-width="2"/>
  <text x="130" y="286" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#123457">Sensors</text>
  <text x="130" y="320" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• MPU6050 (motion)</text>
  <text x="130" y="352" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• MAX30102 (HR / SpO2 / HRV)</text>
  <text x="130" y="384" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• TMP117 (skin temperature)</text>
  <text x="130" y="416" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• GSR (stress proxy)</text>

  <rect x="110" y="478" width="440" height="190" rx="14" fill="#f8fcff" stroke="#9ec4eb" stroke-width="2"/>
  <text x="130" y="514" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#123457">ESP32 Firmware</text>
  <text x="130" y="548" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">`esp32/src/main.cpp`</text>
  <text x="130" y="580" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• sensor sampling + smoothing</text>
  <text x="130" y="612" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• stress/HR metrics computation</text>
  <text x="130" y="644" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">• USB serial packet output</text>

  <rect x="110" y="692" width="440" height="160" rx="14" fill="#f8fcff" stroke="#9ec4eb" stroke-width="2"/>
  <text x="130" y="728" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#123457">On-Device Display</text>
  <text x="130" y="760" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">Waveshare 1.69" LCD</text>
  <text x="130" y="792" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#1f3f63">ST7789V2, 240x280, SPI</text>

  <rect x="640" y="160" width="420" height="300" rx="22" fill="url(#contractGrad)" stroke="#b294e7" stroke-width="2" filter="url(#shadow)"/>
  <text x="850" y="210" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#4b2e74">Data Contract</text>
  <rect x="675" y="240" width="350" height="188" rx="12" fill="#fbf8ff" stroke="#c5adef" stroke-width="2"/>
  <text x="695" y="278" font-family="Consolas, Menlo, monospace" font-size="18" fill="#4b2e74">DATA,ms,acc_x,acc_y,acc_z,</text>
  <text x="695" y="306" font-family="Consolas, Menlo, monospace" font-size="18" fill="#4b2e74">gsr_kohm,stress,hr_bpm,</text>
  <text x="695" y="334" font-family="Consolas, Menlo, monospace" font-size="18" fill="#4b2e74">spo2,hrv_ms,temp_f</text>
  <text x="695" y="372" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="18" fill="#4b2e74">USB serial @ 115200 baud</text>
  <text x="695" y="400" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="18" fill="#4b2e74">Used by logger + Pi runtime</text>

  <rect x="1120" y="160" width="410" height="365" rx="22" fill="url(#perceptionGrad)" stroke="#8ec89f" stroke-width="2" filter="url(#shadow)"/>
  <text x="1325" y="210" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f5a32">Perception Layer</text>

  <rect x="1155" y="244" width="340" height="118" rx="12" fill="#f7fff8" stroke="#9fd6ae" stroke-width="2"/>
  <text x="1175" y="278" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#215a35">Camera Input</text>
  <text x="1175" y="308" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#215a35">Desktop webcam or Pi camera</text>
  <text x="1175" y="338" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="20" fill="#215a35">(OpenCV backend)</text>

  <rect x="1155" y="378" width="340" height="126" rx="12" fill="#f7fff8" stroke="#9fd6ae" stroke-width="2"/>
  <text x="1175" y="412" font-family="Consolas, Menlo, monospace" font-size="19" fill="#215a35">health_monitor.py /</text>
  <text x="1175" y="438" font-family="Consolas, Menlo, monospace" font-size="19" fill="#215a35">pi_health_monitor.py</text>
  <text x="1175" y="468" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="18" fill="#215a35">10s calibration + 60s rolling metrics</text>

  <rect x="920" y="560" width="610" height="330" rx="22" fill="url(#robotGrad)" stroke="#e5b874" stroke-width="2" filter="url(#shadow)"/>
  <text x="1225" y="610" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#73491a">Robot Coaching Layer</text>

  <rect x="955" y="642" width="260" height="220" rx="12" fill="#fffaf0" stroke="#ebc88f" stroke-width="2"/>
  <text x="975" y="676" font-family="Consolas, Menlo, monospace" font-size="19" fill="#73491a">main.py / pi_main.py</text>
  <text x="975" y="706" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">• decision categories</text>
  <text x="975" y="736" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">• coaching cadence (60s)</text>
  <text x="975" y="766" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">• random reminders</text>
  <text x="975" y="796" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">• fail-safe idle behavior</text>

  <rect x="1240" y="642" width="255" height="100" rx="12" fill="#fffaf0" stroke="#ebc88f" stroke-width="2"/>
  <text x="1260" y="678" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">Face Expressions</text>
  <text x="1260" y="708" font-family="Consolas, Menlo, monospace" font-size="18" fill="#73491a">robot/faces/*.png</text>

  <rect x="1240" y="762" width="255" height="100" rx="12" fill="#fffaf0" stroke="#ebc88f" stroke-width="2"/>
  <text x="1260" y="798" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="19" fill="#73491a">Voice Coaching</text>
  <text x="1260" y="828" font-family="Consolas, Menlo, monospace" font-size="18" fill="#73491a">ElevenLabs TTS API</text>

  <line x1="550" y1="390" x2="640" y2="300" stroke="#375a7f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1060" y1="315" x2="1155" y2="315" stroke="#375a7f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1325" y1="525" x2="1325" y2="560" stroke="#375a7f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="590" y1="560" x2="920" y2="700" stroke="#375a7f" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="585" y="365" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="16" fill="#375a7f">telemetry schema</text>
  <text x="706" y="280" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="16" fill="#375a7f">shared format</text>
  <text x="612" y="548" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="16" fill="#375a7f">serial + metrics</text>
  <text x="1339" y="548" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="16" fill="#375a7f">health snapshot</text>

  <text x="800" y="945" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="16" fill="#60708a">BioBuddy Architecture • Wearable -> Perception + Telemetry -> Robot Coaching</text>
</svg>
